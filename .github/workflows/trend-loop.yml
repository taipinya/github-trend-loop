name: GitHub Trend Loop

on:
  schedule:
    - cron: "0 2 */3 * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  trend-loop:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run trend loop
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: python scripts/run_loop.py

      - name: Commit loop outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/ reports/ STATE.md loop-run-log.md
          if git diff --cached --quiet; then
            echo "No loop output changes to commit."
          else
            git commit -m "Update GitHub trend loop report"
            git push
          fi

      - name: Upload reports and data
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: github-trend-loop-output
          path: |
            reports/
            data/
            STATE.md
            loop-run-log.md
